version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dronetrack
      POSTGRES_USER: dronetrack
      POSTGRES_PASSWORD: dronetrack123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dronetrack
      SPRING_DATASOURCE_USERNAME: dronetrack
      SPRING_DATASOURCE_PASSWORD: dronetrack123
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
